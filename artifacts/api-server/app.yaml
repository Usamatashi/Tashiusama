runtime: nodejs22
entrypoint: node --enable-source-maps ./dist/index.mjs
instance_class: F4

env_variables:
  NODE_ENV: "production"
  PORT: "8080"
  # REQUIRED: Set these in GCloud Console → App Engine → Versions → Edit → Environment Variables
  # Do NOT put secrets directly in this file — set them in the Cloud Console UI:
  #   FIREBASE_SERVICE_ACCOUNT  — full JSON content of your Firebase service account key
  #   JWT_SECRET                — a long random string (must match what was used to sign existing tokens)
  #
  # If FIREBASE_SERVICE_ACCOUNT is missing → Firestore queries return empty/fail
  # If JWT_SECRET is missing/wrong        → all authenticated API calls return 401
